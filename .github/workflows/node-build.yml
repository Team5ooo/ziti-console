name: Node Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: npm build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare local library path
        run: |
          mkdir -p dist/ziti-console-lib
          cat > dist/ziti-console-lib/package.json <<'EOF'
          {
            "name": "ziti-console-lib",
            "version": "0.0.0"
          }
          EOF

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Capture version
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        run: echo "APP_VERSION=$(jq -r .version package.json)" >> "$GITHUB_ENV"

      - name: Build controller SPA artifact
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        run: ./build.sh /zac/

      - name: Package controller SPA artifact
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        run: |
          cd dist/app-ziti-console
          zip -r ../../ziti-console.zip *

      - name: Create build release
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-ziti-console-v${{ env.APP_VERSION }}-build.${{ github.run_number }}
          name: app-ziti-console-v${{ env.APP_VERSION }}-build.${{ github.run_number }}
          target_commitish: ${{ github.sha }}
          prerelease: false
          make_latest: true
          generate_release_notes: true
          files: ziti-console.zip
